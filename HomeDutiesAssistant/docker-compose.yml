# PostgreSQL with the pgvector extension pre-installed.
# This is the "RAG database" that stores your home-duty facts AND their
# embeddings (vectors), and does the similarity search for us.
#
# Start it with:   docker compose up -d
# Stop it with:    docker compose down        (data is kept in the volume)
services:
  pgvector:
    image: pgvector/pgvector:pg17     # official Postgres 17 image + pgvector
    container_name: home-duties-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: home
      POSTGRES_PASSWORD: home
      POSTGRES_DB: homeduties
    ports:
      - "5432:5432"                   # exposed on localhost:5432 for the C# app
    volumes:
      - pgdata:/var/lib/postgresql/data   # persists the data between restarts

volumes:
  pgdata: